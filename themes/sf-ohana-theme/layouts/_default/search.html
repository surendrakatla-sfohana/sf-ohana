{{ define "main" }}
<div class="search-page">
    <div class="container">
        <h1 class="search-title">Search Documentation</h1>

        <div class="search-container">
            <input type="text" id="search-input" class="search-input" placeholder="Search for topics, keywords, or code...">
            <button id="search-button" class="search-button">Search</button>
        </div>

        <div id="search-results" class="search-results">
            <!-- Results will be populated by JavaScript -->
        </div>

        <div id="search-loading" class="search-loading" style="display: none;">
            Searching...
        </div>

        <div id="search-no-results" class="search-no-results" style="display: none;">
            No results found. Try different keywords.
        </div>
    </div>
</div>

<script>
// Search index will be loaded from the JSON output
let searchIndex = null;
let indexLoadError = false;

// Load search index with fallback for development
const baseUrl = '{{ .Site.BaseURL }}';
let searchIndexLoaded = false;

// Try multiple paths to handle both dev and production
const indexPaths = [
    '{{ "index.json" | relURL }}',  // Works in both dev and production
    baseUrl + 'index.json'  // Fallback
];

async function loadSearchIndex() {
    for (const path of indexPaths) {
        if (searchIndexLoaded) break;

        try {
            console.log('Trying to load search index from:', path);
            const response = await fetch(path);
            if (response.ok) {
                const data = await response.json();
                console.log('Search index loaded successfully from:', path, 'Items:', data.length);
                searchIndex = data;
                searchIndexLoaded = true;

                // Hide loading message if showing
                const loadingContainer = document.getElementById('search-loading');
                if (loadingContainer.style.display === 'block') {
                    loadingContainer.style.display = 'none';
                }
                return;
            }
        } catch (error) {
            console.log('Failed to load from', path, ':', error.message);
        }
    }

    // If all paths failed
    if (!searchIndexLoaded) {
        console.error('Failed to load search index from any path');
        indexLoadError = true;
        const loadingContainer = document.getElementById('search-loading');
        loadingContainer.innerHTML = 'Search is not available in development mode. It will work in production.';
        loadingContainer.style.display = 'block';
    }
}

// Start loading
loadSearchIndex();

// Search functionality
document.getElementById('search-button').addEventListener('click', performSearch);
document.getElementById('search-input').addEventListener('keypress', function(e) {
    if (e.key === 'Enter') {
        performSearch();
    }
});

function performSearch() {
    const query = document.getElementById('search-input').value.toLowerCase();
    const resultsContainer = document.getElementById('search-results');
    const noResultsContainer = document.getElementById('search-no-results');
    const loadingContainer = document.getElementById('search-loading');

    if (!query) {
        resultsContainer.innerHTML = '';
        noResultsContainer.style.display = 'none';
        return;
    }

    if (!searchIndex) {
        if (indexLoadError) {
            loadingContainer.innerHTML = 'Search index could not be loaded. Please refresh the page.';
            loadingContainer.style.display = 'block';
        } else {
            loadingContainer.innerHTML = 'Search index is still loading...';
            loadingContainer.style.display = 'block';
            setTimeout(performSearch, 500);
        }
        return;
    }

    loadingContainer.style.display = 'none';

    const results = searchIndex.filter(item => {
        return item.title.toLowerCase().includes(query) ||
               item.content.toLowerCase().includes(query) ||
               (item.tags && item.tags.some(tag => tag.toLowerCase().includes(query)));
    });

    if (results.length === 0) {
        resultsContainer.innerHTML = '';
        noResultsContainer.style.display = 'block';
    } else {
        noResultsContainer.style.display = 'none';
        displayResults(results);
    }
}

function displayResults(results) {
    const resultsContainer = document.getElementById('search-results');
    let html = '<div class="results-list">';

    results.forEach(result => {
        html += '<article class="result-item">';
        html += '<h3 class="result-title">';
        html += '<a href="' + result.permalink + '">' + result.title + '</a>';
        html += '</h3>';
        html += '<p class="result-summary">' + result.summary + '</p>';
        html += '<div class="result-meta">';
        html += '<span class="result-section">' + result.section + '</span>';
        if (result.date) {
            html += '<time class="result-date">Updated: ' + formatDate(result.date) + '</time>';
        }
        html += '</div>';
        html += '</article>';
    });

    html += '</div>';
    resultsContainer.innerHTML = html;
}

function formatDate(dateString) {
    const date = new Date(dateString);
    if (Number.isNaN(date.getTime())) return dateString;
    const options = { year: 'numeric', month: 'short', day: 'numeric' };
    return date.toLocaleDateString('en-US', options);
}
</script>
{{ end }}
