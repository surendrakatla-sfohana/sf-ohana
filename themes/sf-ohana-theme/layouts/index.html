{{ define "main" }}
<div class="homepage">
    <!-- Hero Section -->
    <section class="hero">
        <div class="container">
            <h1 class="hero-title">Welcome to SF Ohana</h1>
            <p class="hero-subtitle">Your comprehensive Salesforce knowledge base and technical documentation hub</p>
        </div>
    </section>

    <!-- Topic Selection Section -->
    <section class="topic-selection">
        <div class="container">
            <h2 class="section-title">Pick One</h2>
            <div class="topic-grid">
                {{ range .Site.Params.topics }}
                <a href="{{ .url }}" class="topic-card">
                    <div class="topic-card-image">
                        {{ if .image }}
                        <img src="{{ .image | relURL }}" alt="{{ .name }}" width="80" height="80">
                        {{ else }}
                        <!-- Fallback placeholder image -->
                        <div class="placeholder-icon" style="width: 80px; height: 80px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); border-radius: 12px; display: flex; align-items: center; justify-content: center;">
                            <span style="color: white; font-size: 36px; font-weight: bold;">{{ substr .name 0 1 }}</span>
                        </div>
                        {{ end }}
                    </div>
                    <h3 class="topic-card-title">{{ .name }}</h3>
                    <p class="topic-card-description">{{ .description }}</p>
                </a>
                {{ end }}
            </div>
        </div>
    </section>

    <!-- Recent Updates Section -->
    <!-- <section class="recent-updates">
        <div class="container">
            <h2 class="section-title">Recent Updates</h2>
            <div class="updates-list">
                {{ range first 5 (where .Site.RegularPages "Type" "ne" "page") }}
                <article class="update-item">
                    <time class="update-date">{{ .Date.Format "Jan 2, 2006" }}</time>
                    <h3 class="update-title">
                        <a href="{{ .Permalink }}">{{ .Title }}</a>
                    </h3>
                    <p class="update-summary">{{ .Summary | truncate 150 }}</p>
                </article>
                {{ end }}
            </div>
        </div>
    </section> -->
</div>
{{ end }}
